<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PAMIDI ROHIT — Full-Stack Developer & AI Engineer</title>
  <meta name="description" content="Pamidi Rohit — B.Tech AI & Data Science student at IIIT Sri City. Full-Stack Developer, ML Engineer, 600+ LeetCode problems. Explore projects, skills, and more." />
  <meta name="keywords" content="Pamidi Rohit, IIIT Sri City, full stack developer, AI engineer, machine learning, React, Node.js, Python, portfolio" />
  <meta name="author" content="Pamidi Rohit" />
  <!-- Open Graph -->
  <meta property="og:title" content="Pamidi Rohit — Portfolio" />
  <meta property="og:description" content="Full-Stack Developer & ML Engineer at IIIT Sri City. 22+ projects, 600+ LeetCode problems." />
  <meta property="og:image" content="profile.jpg" />
  <meta property="og:type" content="website" />
  <!-- Favicon: GitHub avatar -->
  <link rel="icon" type="image/jpeg" href="profile.jpg" />

  <!-- Google Fonts: Roboto (Google's publicly licensed font) + Product Sans approximation -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    /* ─── Reset & Base ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: arial, sans-serif;
      background: #fff;
      color: #202124;
    }

    a { text-decoration: none; color: inherit; }
    a:hover { text-decoration: underline; }

    /* ─── Header ───────────────────────────────────────────────────────── */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      height: 60px;
      background: #fff;
    }

    #header-left {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    #header-left a {
      font-size: 13px;
      color: #202124;
    }

    #header-right {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .hdr-link {
      font-size: 13px;
      color: #202124;
      padding: 8px 12px;
      border-radius: 4px;
      transition: background .15s;
    }
    .hdr-link:hover { background: #f1f3f4; text-decoration: none; }

    /* Google-style minimalist icon buttons */
    .hdr-icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color .15s ease;
      position: relative;
    }
    .hdr-icon-btn:hover { background: rgba(60,64,67,0.08); }
    .hdr-icon-btn svg { 
      width: 20px; 
      height: 20px;
      fill: #5f6368;
      transition: fill .15s ease;
    }
    .hdr-icon-btn:hover svg { fill: #202124; }

    /* Profile avatar */
    #profile-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      margin-left: 6px;
      border: 1px solid #dadce0;
      transition: box-shadow .15s ease;
    }
    #profile-avatar:hover { box-shadow: 0 1px 3px rgba(60,64,67,.3); }
    #profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ─── Main Content ─────────────────────────────────────────────────── */
    #main {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-top: 15vh;
      padding-bottom: 100px;
    }

    /* ─── Logo ─────────────────────────────────────────────────────────── */
    #logo {
      margin-bottom: 28px;
      text-align: center;
      line-height: 1;
      font-family: 'Nunito', sans-serif;
      font-size: 78px;
      font-weight: 800;
      letter-spacing: -2px;
      user-select: none;
    }

    /* Google logo color cycle: blue, red, yellow, blue, green, red */
    #logo .l1 { color: #4285F4; }
    #logo .l2 { color: #EA4335; }
    #logo .l3 { color: #FBBC05; }
    #logo .l4 { color: #4285F4; }
    #logo .l5 { color: #34A853; }
    #logo .l6 { color: #EA4335; }
    #logo .l7 { color: #4285F4; }
    #logo .l8 { color: #EA4335; }
    #logo .l9 { color: #FBBC05; }
    #logo .l10 { color: #4285F4; }
    #logo .l11 { color: #34A853; }
    #logo .logo-space { display: inline-block; width: 24px; }

    /* ─── Search Form ──────────────────────────────────────────────────── */
    #search-form {
      width: 100%;
      max-width: 584px;
      padding: 0 16px;
    }

    #search-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
      height: 46px;
      border-radius: 24px;
      background: #fff;
      padding: 2px;
      transition: box-shadow .3s;
    }
    #search-wrapper:hover, #search-wrapper:focus-within {
      box-shadow: 0 2px 8px rgba(32,33,36,.2);
    }
    /* Animated gradient border via background on outer wrapper */
    #search-wrapper::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      padding: 2px;
      background: conic-gradient(from var(--gradient-angle, 0deg), #4285F4, #EA4335, #FBBC05, #34A853, #4285F4);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      opacity: 0;
      transition: opacity .35s;
      animation: borderSpin 2.5s linear infinite;
      pointer-events: none;
    }
    #search-wrapper:hover::before, #search-wrapper:focus-within::before {
      opacity: 1;
    }
    /* Static border when not hovered */
    #search-wrapper::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 24px;
      border: 1px solid #dfe1e5;
      pointer-events: none;
      transition: opacity .35s;
    }
    #search-wrapper:hover::after, #search-wrapper:focus-within::after {
      opacity: 0;
    }
    @property --gradient-angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }
    @keyframes borderSpin {
      to { --gradient-angle: 360deg; }
    }

    /* AI Mode pill button (like Google AI Mode) */
    .ai-mode-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px 6px 10px;
      border: 1px solid #dadce0;
      border-radius: 20px;
      background: #fff;
      font-family: 'Roboto', arial, sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #3c4043;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      position: relative;
      overflow: hidden;
      transition: border-color .3s, box-shadow .3s, background .2s;
    }
    .ai-mode-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
    .ai-mode-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      padding: 1.5px;
      background: conic-gradient(from var(--gradient-angle, 0deg), #4285F4, #EA4335, #FBBC05, #34A853, #4285F4);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      opacity: 0;
      transition: opacity .3s;
      animation: borderSpin 2.5s linear infinite;
    }
    .ai-mode-btn:hover {
      border-color: transparent;
      box-shadow: 0 1px 4px rgba(66,133,244,.25);
      text-decoration: none;
    }
    .ai-mode-btn:hover::before { opacity: 1; }
    .ai-mode-btn:hover svg {
      filter: drop-shadow(0 0 3px rgba(66,133,244,.5));
    }

    /* Magnifying glass icon */
    #search-icon-left {
      position: absolute;
      left: 14px;
      display: flex;
      align-items: center;
      pointer-events: none;
    }
    #search-icon-left svg { width: 20px; height: 20px; fill: #9aa0a6; }

    #search-input {
      flex: 1;
      height: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-family: arial, sans-serif;
      font-size: 16px;
      color: #202124;
      padding: 0 140px 0 44px;
      min-width: 0;
    }

    /* Right icons: mic + voice + AI mode */
    #search-icons-right {
      position: absolute;
      right: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #search-icons-right button {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
    }
    #search-icons-right button:hover { background: #f1f3f4; }
    #search-icons-right svg { width: 22px; height: 22px; }

    .search-separator {
      width: 1px;
      height: 28px;
      background: #dadce0;
      margin: 0 4px;
      flex-shrink: 0;
    }



    /* ─── Buttons Row ──────────────────────────────────────────────────── */
    #buttons-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 28px;
      flex-wrap: wrap;
      padding: 0 16px;
    }

    .search-btn {
      background: #f8f9fa;
      border: 1px solid #f8f9fa;
      border-radius: 4px;
      color: #3c4043;
      font-family: arial, sans-serif;
      font-size: 14px;
      height: 36px;
      padding: 0 23px;
      cursor: pointer;
      white-space: nowrap;
      transition: box-shadow .15s, border-color .15s;
    }
    .search-btn:hover {
      border-color: #dadce0;
      box-shadow: 0 1px 1px rgba(0,0,0,.1);
    }

    /* ─── Social Links Row ─────────────────────────────────────────────── */
    #social-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 36px;
    }

    .social-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      color: #3c4043;
      border: 1px solid #dadce0;
      cursor: pointer;
      text-decoration: none;
      transition: box-shadow .15s, background .15s;
    }
    .social-chip:hover {
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
      background: #f8f9fa;
      text-decoration: none;
    }
    .social-chip svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* ─── Suggestions (I'm Feeling Lucky style) ────────────────────────── */
    #quick-searches {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      max-width: 584px;
      padding: 0 16px;
    }

    .qs-chip {
      padding: 6px 14px;
      border: 1px solid #dadce0;
      border-radius: 16px;
      font-size: 13px;
      color: #3c4043;
      cursor: pointer;
      background: #fff;
      transition: background .15s, box-shadow .15s, border-color .3s;
      position: relative;
    }
    .qs-chip::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      padding: 1px;
      background: conic-gradient(from var(--gradient-angle, 0deg), #4285F4, #EA4335, #FBBC05, #34A853, #4285F4);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      opacity: 0;
      transition: opacity .3s;
      animation: borderSpin 2.5s linear infinite;
    }
    .qs-chip:hover {
      background: #fff;
      border-color: transparent;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }
    .qs-chip:hover::before { opacity: 1; }

    /* ─── Footer ───────────────────────────────────────────────────────── */
    #footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #f2f2f2;
      color: #70757a;
      font-size: 14px;
    }

    #footer-top {
      border-bottom: 1px solid #e0e0e0;
      padding: 12px 24px;
      text-align: center;
    }

    #footer-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 24px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .footer-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .footer-link {
      color: #70757a;
      font-size: 13px;
      padding: 4px 8px;
      border-radius: 3px;
      transition: background .15s;
    }
    .footer-link:hover { background: #e2e2e2; text-decoration: none; }

    /* ─── Autocomplete Dropdown ────────────────────────────────────────── */
    #autocomplete {
      display: none;
      position: absolute;
      top: calc(100% + 2px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #dfe1e5;
      border-top: none;
      border-radius: 0 0 24px 24px;
      box-shadow: 0 4px 6px rgba(32,33,36,.28);
      z-index: 200;
      padding: 8px 0;
      overflow: hidden;
    }
    .ac-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 16px 10px 48px;
      font-size: 16px;
      cursor: pointer;
      position: relative;
    }
    .ac-item:hover { background: #f8f9fa; }
    .ac-icon { position: absolute; left: 16px; color: #9aa0a6; }
    .ac-icon svg { width: 20px; height: 20px; fill: #9aa0a6; }

    #search-container {
      position: relative;
      width: 100%;
      max-width: 584px;
      padding: 0 16px;
    }
    #search-container #search-wrapper { /* nested fix */ }

    /* ─── Responsive ───────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      #header { padding: 0 12px 0 8px; height: 56px; }
      #header-left { display: none; }
      #header-right { gap: 4px; }
      .hdr-icon-btn { width: 40px; height: 40px; }
      .hdr-icon-btn svg { width: 20px; height: 20px; }
      #profile-avatar { width: 32px; height: 32px; }
      #main { padding-top: 14vh; }
      #logo { font-size: 48px; letter-spacing: -1px; }
      #search-container { padding: 0 12px; }
      #search-wrapper { max-width: 100%; }
      #buttons-row { gap: 8px; margin-top: 20px; }
      .search-btn { font-size: 13px; padding: 0 16px; height: 34px; }
      #social-row { gap: 10px; flex-wrap: wrap; justify-content: center; }
      .social-chip span { display: none; }
      .social-chip { padding: 8px; gap: 0; }
      #quick-searches { max-width: 100%; padding: 0 12px; }
      #footer-bottom { flex-direction: column; align-items: center; text-align: center; }
    }
    @media (max-width: 400px) {
      #header { height: 56px; padding: 0 8px; }
      #logo { font-size: 38px; }
      #main { padding-top: 10vh; }
      .search-btn { font-size: 12px; padding: 0 12px; height: 32px; }
      .hdr-icon-btn { width: 36px; height: 36px; }
      .hdr-icon-btn svg { width: 18px; height: 18px; }
      #profile-avatar { width: 28px; height: 28px; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════  HEADER  ════════════════════════════════ -->

    <!-- Profile Avatar -->
    <a href="search.html?q=about+rohit" id="profile-avatar" title="Pamidi Rohit">

  </div>

<!-- ═══════════════════════════  MAIN  ══════════════════════════════════ -->
<main id="main">

  <!-- Logo -->
  <div id="logo" aria-label="PAMIDI ROHIT">
    <span class="l1">P</span><span class="l2">A</span><span class="l3">M</span><span class="l4">I</span><span class="l5">D</span><span class="l6">I</span><span class="logo-space"></span><span class="l7">R</span><span class="l8">O</span><span class="l9">H</span><span class="l10">I</span><span class="l11">T</span>
  </div>

  <!-- Search Container -->
  <div id="search-container">
    <div id="search-wrapper">
      <!-- Left: search icon -->
      <span id="search-icon-left">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      </span>

      <!-- Input -->
      <input
        type="text"
        id="search-input"
        autocomplete="off"
        spellcheck="false"
        placeholder=""
        aria-label="Search"
      />

      <!-- Right: mic + clear -->
      <div id="search-icons-right">
        <button id="clear-btn" style="display:none;" title="Clear" onclick="clearSearch()">
          <svg viewBox="0 0 24 24" fill="#70757a"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
        <span class="search-separator"></span>
        <button title="Search by voice" onclick="voiceSearch()">
          <svg viewBox="0 0 24 24">
            <path fill="#4285F4" d="M12 15c1.66 0 3-1.34 3-3V6c0-1.66-1.34-3-3-3S9 4.34 9 6v6c0 1.66 1.34 3 3 3z"/>
            <path fill="#34A853" d="M11 18.93V21h2v-2.07c3.39-.49 6-3.39 6-6.93h-2c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.93z"/>
          </svg>
        </button>
        <span class="search-separator"></span>
        <a href="gemini.html" class="ai-mode-btn" title="Ask Rohit AI" style="margin-right:2px;">
          <svg viewBox="0 0 24 24" fill="none" style="width:18px;height:18px;">
            <defs><linearGradient id="ai-g2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4285F4"/><stop offset="50%" stop-color="#EA4335"/><stop offset="100%" stop-color="#FBBC05"/></linearGradient></defs>
            <path d="M12 2L13.5 8.5L20 10L13.5 11.5L12 18L10.5 11.5L4 10L10.5 8.5Z" fill="url(#ai-g2)"/>
            <path d="M19 14L19.7 16.3L22 17L19.7 17.7L19 20L18.3 17.7L16 17L18.3 16.3Z" fill="url(#ai-g2)" opacity=".7"/>
          </svg>
          AI Mode
        </a>
      </div>
    </div>

    <!-- Autocomplete dropdown -->
    <div id="autocomplete"></div>
  </div>

  <!-- Buttons -->
  <div id="buttons-row">
    <button class="search-btn" onclick="doSearch()">Pamidi Search</button>
    <button class="search-btn" onclick="luckySearch()">I'm Feeling Lucky</button>

<script>
  const SUGGESTIONS = [
    "projects by rohit",
    "full stack developer",
    "machine learning projects",
    "react nodejs developer",
    "IIIT Sri City student",
    "computer vision projects",
    "food delivery app rohit",
    "cinematch movie recommendation",
    "heart disease prediction",
    "rohit's skills",
    "contact pamidi rohit",
    "leetcode 600 problems"
  ];

  const input = document.getElementById('search-input');
  const autocomplete = document.getElementById('autocomplete');
  const clearBtn = document.getElementById('clear-btn');

  // Input events
  input.addEventListener('input', () => {
    const val = input.value.trim();
    clearBtn.style.display = val ? 'flex' : 'none';
    showAutocomplete(val);
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
    if (e.key === 'Escape') hideAutocomplete();
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('#search-container')) hideAutocomplete();
  });

  function showAutocomplete(val) {
    if (!val) { hideAutocomplete(); return; }
    const matches = SUGGESTIONS.filter(s => s.includes(val.toLowerCase())).slice(0, 6);
    if (matches.length === 0) { hideAutocomplete(); return; }

    autocomplete.innerHTML = matches.map(s => `
      <div class="ac-item" onclick="selectSuggestion('${s}')">
        <span class="ac-icon">
          <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </span>
        ${s}
      </div>
    `).join('');
    autocomplete.style.display = 'block';
  }

  function hideAutocomplete() { autocomplete.style.display = 'none'; }

  function selectSuggestion(s) {
    input.value = s;
    clearBtn.style.display = 'flex';
    hideAutocomplete();
    doSearch();
  }

  function doSearch() {
    const q = input.value.trim();
    if (q) window.location.href = `search.html?q=${encodeURIComponent(q)}`;
  }

  function searchTerm(term) {
    input.value = term;
    doSearch();
  }

  function luckySearch() {
    const lucky = [
      'https://github.com/PAMIDIROHIT/Food-Delivery-MAIN1',
      'https://github.com/PAMIDIROHIT/cinematch-ai',
      'https://github.com/PAMIDIROHIT/HeartDisease-ML-FullStack',
      'https://github.com/PAMIDIROHIT/Wanderlust',
      'https://github.com/PAMIDIROHIT/nestjs-api-project'
    ];
    window.open(lucky[Math.floor(Math.random() * lucky.length)], '_blank');
  }

  function clearSearch() {
    input.value = '';
    clearBtn.style.display = 'none';
    hideAutocomplete();
    input.focus();
  }

  function openAI() { window.location.href = 'gemini.html'; }

  function voiceSearch() {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      alert('Voice search is not supported in this browser.');
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SR();
    recognition.lang = 'en-US';
    recognition.onresult = e => {
      const transcript = e.results[0][0].transcript;
      input.value = transcript;
      clearBtn.style.display = 'flex';
      doSearch();
    };
    recognition.start();
  }

  // Google Apps menu toggle function
  function toggleAppsMenu(event) {
    event.preventDefault();
    
    // Create or toggle apps menu
    let existingMenu = document.querySelector('.apps-menu');
    if (existingMenu) {
      existingMenu.remove();
      return;
    }

    const menu = document.createElement('div');
    menu.className = 'apps-menu';
    menu.style.cssText = `
      position: fixed;
      top: 60px;
      right: 12px;
      width: 300px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(60,64,67,0.15);
      padding: 16px;
      z-index: 1000;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    `;

    const apps = [
      { name: 'Search', icon: '🔍', url: 'search.html' },
      { name: 'Projects', icon: '📁', url: 'search.html?q=projects' },
      { name: 'About', icon: '👤', url: 'search.html?q=about' },
      { name: 'Contact', icon: '📧', url: 'search.html?q=contact' },
      { name: 'GitHub', icon: '💻', url: 'https://github.com/PAMIDIROHIT' },
      { name: 'LinkedIn', icon: '💼', url: 'https://www.linkedin.com/in/rohit-pamidi-4147771ba/' }
    ];

    apps.forEach(app => {
      const appDiv = document.createElement('a');
      appDiv.href = app.url;
      if (app.url.startsWith('http')) appDiv.target = '_blank';
      appDiv.style.cssText = `
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 16px 8px;
        text-decoration: none;
        color: #202124;
        border-radius: 8px;
        transition: background 0.15s;
      `;
      appDiv.onmouseover = () => appDiv.style.background = '#f8f9fa';
      appDiv.onmouseout = () => appDiv.style.background = 'transparent';
      
      appDiv.innerHTML = `
        <span style="font-size: 32px; margin-bottom: 8px;">${app.icon}</span>
        <span style="font-size: 12px; text-align: center;">${app.name}</span>
      `;
      menu.appendChild(appDiv);
    });

    document.body.appendChild(menu);

    // Close menu when clicking outside
    const closeMenu = (e) => {
      if (!menu.contains(e.target) && !event.target.closest('.hdr-icon-btn[title="Google apps"]')) {
        menu.remove();
        document.removeEventListener('click', closeMenu);
      }
    };
    setTimeout(() => document.addEventListener('click', closeMenu), 0);
  }
</script>
